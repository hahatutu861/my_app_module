name: my_app_module
description: "Clean Architecture + Riverpod Flutter Module."
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 状态管理 - Riverpod
  flutter_riverpod: ^2.6.1
  hooks_riverpod: ^2.6.1

  # 路由导航
  go_router: ^14.6.2

  # 网络请求
  dio: ^5.7.0
  connectivity_plus: ^6.1.0

  # 数据处理
  json_serializable: ^6.9.2
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4

  # 本地存储
  path_provider: ^2.1.5
  shared_preferences: ^2.3.4
  sqflite: ^2.4.1
  path: ^1.9.0

  # 工具类
  logger: ^2.5.0
  uuid: ^4.5.1
  intl: ^0.20.1

  # UI 组件
  flutter_hooks: ^0.20.5
  gap: ^3.0.1
  lottie: ^3.1.3
  measure_size: ^5.0.1
  flutter_screenutil: ^5.9.0
  flutter_slidable: ^4.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # 代码生成
  build_runner: ^2.4.13
  freezed: ^2.5.7

  # 平台通信 - Pigeon
  pigeon: ^22.0.0

  # 测试
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/images/lottie_images/
    - assets/icons/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/inter_regular.ttf
          weight: 400
        - asset: assets/fonts/inter_medium.ttf
          weight: 500
        - asset: assets/fonts/inter_semibold.ttf
          weight: 600

  module:
    androidX: true
    androidPackage: com.myapp.my_app_module
    iosBundleIdentifier: com.myapp.myAppModule
